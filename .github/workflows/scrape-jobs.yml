name: Scrape Jobs Daily

on:
  schedule:
    # Roda todo dia às 6h UTC (3h Brasília)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite rodar manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install cheerio node-fetch@2 @supabase/supabase-js

      - name: Scrape ACMP Global Jobs & Cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/scrape-jobs.js
