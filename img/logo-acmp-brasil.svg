  <line x1="28" y1="118" x2="82" y2="118" stroke="#1a3a5c" stroke-width="10" stroke-linecap="round"/>
  <!-- Orange triangle inside A -->
  <polygon points="55,62 42,90 68,90" fill="#e8842c"/>

  <!-- C letter -->
  <path d="M130 60 C105 60, 95 80, 95 92.5 C95 105, 105 128, 130 128" stroke="#1a3a5c" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- M letter -->
  <path d="M155 128 L155 55 L185 95 L215 55 L215 128" stroke="#1a3a5c" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- P letter -->
