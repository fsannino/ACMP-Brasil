<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@800&amp;display=swap');
      .acmp-letter { fill: #1e3a5f; font-family: 'Inter', 'Arial Black', 'Helvetica Neue', sans-serif; font-weight: 800; }
    </style>
  </defs>

  <!-- ACMP letters -->
  <text x="30" y="130" class="acmp-letter" font-size="140" letter-spacing="-2">ACMP</text>

  <!-- Orange triangle inside the A -->
  <polygon points="95,72 78,100 112,100" fill="#e88c30"/>

  <!-- BRASIL text -->
  <text x="145" y="192" class="acmp-letter" font-size="48" letter-spacing="10">BRASIL</text>

  <!-- Brazilian Flag -->
  <g transform="translate(398, 152) scale(0.85)">
    <!-- Green base (waving flag shape) -->
    <path d="M0,10 C8,3 25,-2 55,2 C58,2 62,5 65,8 L65,42 C55,48 30,50 10,46 C5,45 2,42 0,38 Z" fill="#009c3b"/>
    <!-- Yellow diamond -->
    <path d="M8,22 L33,8 L58,22 L33,40 Z" fill="#ffdf00"/>
    <!-- Blue circle -->
    <circle cx="33" cy="23" r="10" fill="#002776"/>
    <!-- White band -->
    <path d="M23,21 Q33,17 43,21 Q33,25 23,21 Z" fill="white" opacity="0.9"/>
  </g>
</svg>
