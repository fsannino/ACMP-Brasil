<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Gestão de Mudanças - ACMP Brasil</title>
    <link rel="icon" type="image/png" href="/img/logo-acmp-brasil.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="../js/game-gate.js" defer></script>
    <script src="../js/game-access.js" defer></script>
    <script src="../js/leaderboard.js" defer></script>
    <style>
        :root { --primary: #1a3a5c; --primary-light: #2a5a8c; --secondary: #e8a838; --accent: #28a745; --text-dark: #1a1a2e; --text-body: #4a4a5a; --text-light: #6b7280; --bg-white: #fff; --bg-light: #f8f9fc; --border: #e2e8f0; --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); min-height: 100vh; }
        .quiz-header { background: var(--primary); padding: 14px 0; text-align: center; }
        .quiz-header a { display: inline-flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.8); font-size: 0.85rem; text-decoration: none; }
        .quiz-container { max-width: 700px; margin: 30px auto; padding: 0 20px 60px; }
        .quiz-card { background: var(--bg-white); border-radius: var(--radius-lg); padding: 36px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .quiz-progress { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
        .progress-bar-bg { flex: 1; height: 8px; background: var(--bg-light); border-radius: 50px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 50px; transition: width 0.5s ease; }
        .progress-text { font-size: 0.8rem; color: var(--text-light); font-weight: 600; white-space: nowrap; }
        .quiz-question { font-size: 1.15rem; font-weight: 700; color: var(--text-dark); margin-bottom: 24px; line-height: 1.5; }
        .quiz-options { display: flex; flex-direction: column; gap: 12px; }
        .quiz-option { padding: 16px 20px; border: 2px solid var(--border); border-radius: var(--radius-md); cursor: pointer; font-size: 0.92rem; color: var(--text-body); transition: all 0.2s; display: flex; align-items: flex-start; gap: 12px; }
        .quiz-option:hover { border-color: var(--primary); background: rgba(26,58,92,0.03); }
        .quiz-option.selected { border-color: var(--primary); background: rgba(26,58,92,0.06); color: var(--text-dark); font-weight: 500; }
        .quiz-option.correct { border-color: var(--accent); background: #dcfce7; }
        .quiz-option.wrong { border-color: #dc2626; background: #fee2e2; }
        .quiz-option .opt-letter { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background: var(--bg-light); font-weight: 700; font-size: 0.8rem; color: var(--text-light); flex-shrink: 0; }
        .quiz-option.selected .opt-letter { background: var(--primary); color: white; }
        .quiz-option.correct .opt-letter { background: var(--accent); color: white; }
        .quiz-option.wrong .opt-letter { background: #dc2626; color: white; }
        .quiz-explanation { margin-top: 16px; padding: 16px; background: #f0f9ff; border: 1px solid #bae6fd; border-radius: var(--radius-sm); font-size: 0.85rem; color: #0369a1; line-height: 1.6; display: none; }
        .quiz-btn { padding: 14px 32px; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 20px; }
        .quiz-btn:hover { background: var(--primary-light); }
        .quiz-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .quiz-score { text-align: center; padding: 20px 0; }
        .score-circle { width: 140px; height: 140px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; font-weight: 800; }
        .score-value { font-size: 2.5rem; line-height: 1; }
        .score-label { font-size: 0.8rem; opacity: 0.8; }
        .score-msg { font-size: 1.1rem; font-weight: 600; color: var(--text-dark); margin-bottom: 8px; }
        .score-detail { font-size: 0.9rem; color: var(--text-light); margin-bottom: 24px; }
        .score-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .score-actions a, .score-actions button { padding: 12px 24px; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; text-decoration: none; border: 2px solid var(--primary); }
        .btn-replay { background: var(--primary); color: white; }
        .btn-back { background: transparent; color: var(--primary); }
        /* Start screen */
        .quiz-start { text-align: center; }
        .quiz-start h1 { font-size: 1.8rem; font-weight: 800; color: var(--text-dark); margin-bottom: 12px; }
        .quiz-start p { color: var(--text-light); margin-bottom: 24px; line-height: 1.7; }
        .quiz-start .start-icon { font-size: 4rem; color: var(--secondary); margin-bottom: 20px; }
        .quiz-start .stats { display: flex; gap: 20px; justify-content: center; margin-bottom: 24px; }
        .quiz-start .stat { text-align: center; }
        .quiz-start .stat strong { display: block; font-size: 1.3rem; color: var(--primary); }
        .quiz-start .stat span { font-size: 0.78rem; color: var(--text-light); }
    </style>
</head>
<body>
    <div class="quiz-header">
        <a href="/jogos/"><i class="fas fa-arrow-left"></i> Voltar para Todos os Jogos</a>
    </div>

    <div class="quiz-container">
        <div class="quiz-card" id="quiz-card">
            <!-- Start Screen -->
            <div class="quiz-start" id="quiz-start">
                <div class="start-icon"><i class="fas fa-gamepad"></i></div>
                <h1>Quiz: Gestão de Mudanças</h1>
                <p>Teste seus conhecimentos sobre os fundamentos da Gestão de Mudanças baseado no ACMP Standard.</p>
                <div class="stats">
                    <div class="stat"><strong>15</strong><span>Perguntas</span></div>
                    <div class="stat"><strong>~5 min</strong><span>Duração</span></div>
                    <div class="stat"><strong>4</strong><span>Opções cada</span></div>
                </div>
                <button class="quiz-btn" onclick="startQuiz()"><i class="fas fa-play"></i> Começar Quiz</button>
            </div>

            <!-- Question Screen (hidden initially) -->
            <div id="quiz-game" style="display:none;">
                <div class="quiz-progress">
                    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
                    <span class="progress-text" id="progress-text">1/15</span>
                </div>
                <div class="quiz-question" id="question-text"></div>
                <div class="quiz-options" id="options-container"></div>
                <div class="quiz-explanation" id="explanation"></div>
                <button class="quiz-btn" id="next-btn" onclick="nextQuestion()" style="display:none;">Próxima <i class="fas fa-arrow-right"></i></button>
            </div>

            <!-- Score Screen (hidden initially) -->
            <div id="quiz-result" style="display:none;"></div>
        </div>
    </div>

    <script>
    var questions = [
        { q: "Segundo o ACMP Standard, qual é o foco principal da Gestão de Mudanças?", o: ["Gerenciar o cronograma do projeto", "Preparar e apoiar pessoas na adoção de mudanças", "Reduzir custos operacionais", "Implementar novas tecnologias"], c: 1, e: "A Gestão de Mudanças foca no lado humano das transformações, preparando, equipando e apoiando pessoas para adotar mudanças com sucesso." },
        { q: "O que é o ACMP Standard for Change Management?", o: ["Um software de gestão de projetos", "O corpo de conhecimento e melhores práticas da disciplina de CM", "Um certificado de treinamento", "Uma metodologia ágil"], c: 1, e: "O Standard é o documento de referência que define as melhores práticas e o corpo de conhecimento da disciplina." },
        { q: "Qual certificação da ACMP é a mais reconhecida mundialmente?", o: ["PMP", "CCMP", "Scrum Master", "Six Sigma"], c: 1, e: "O CCMP (Certified Change Management Professional) é a certificação profissional mais reconhecida em Gestão de Mudanças." },
        { q: "Segundo pesquisa da Prosci, organizações com excelência em CM atingem qual taxa de sucesso?", o: ["45%", "65%", "88%", "95%"], c: 2, e: "Organizações com excelência em gestão de mudanças atingem 88% de sucesso vs. 13% sem práticas estruturadas." },
        { q: "O que é 'resistência à mudança' no contexto de CM?", o: ["Um defeito de personalidade", "Uma reação natural das pessoas diante do desconhecido", "Falta de competência técnica", "Desobediência organizacional"], c: 1, e: "A resistência é uma reação humana natural. Profissionais de CM devem entender e gerenciar essa resistência, não eliminá-la." },
        { q: "Qual é o papel do 'sponsor' (patrocinador) em um projeto de mudança?", o: ["Desenvolver o software", "Prover apoio visível e ativo à mudança", "Treinar a equipe técnica", "Elaborar o orçamento"], c: 1, e: "O sponsor é o líder executivo que apoia visivelmente a mudança. 73% dos projetos com sponsor ativo têm sucesso." },
        { q: "O que significa ADKAR no contexto de gestão de mudanças?", o: ["Um framework de TI", "Awareness, Desire, Knowledge, Ability, Reinforcement", "Um tipo de certificação", "Uma metodologia ágil"], c: 1, e: "ADKAR é um modelo da Prosci que descreve as 5 etapas da mudança individual: Consciência, Desejo, Conhecimento, Habilidade e Reforço." },
        { q: "Qual é a principal diferença entre Gestão de Mudanças e Gestão de Projetos?", o: ["Não há diferença", "CM foca nas pessoas, GP foca na entrega técnica", "CM é mais rápida", "GP é mais estratégica"], c: 1, e: "Gestão de Projetos cuida do lado técnico (escopo, prazo, custo). Gestão de Mudanças cuida do lado humano (adoção, engajamento)." },
        { q: "O que é 'change readiness' (prontidão para mudança)?", o: ["Velocidade de implementação", "Avaliação de quanto a organização está preparada para a mudança", "Tipo de treinamento", "Fase final do projeto"], c: 1, e: "Change readiness é a avaliação de quão preparada a organização e seus stakeholders estão para abraçar uma mudança." },
        { q: "Quantas horas de treinamento são necessárias para se candidatar ao CCMP?", o: ["10 horas", "21 horas", "40 horas", "100 horas"], c: 1, e: "O CCMP exige mínimo de 21 horas de treinamento em programa aprovado por um QEP (Qualified Education Provider)." },
        { q: "O que é um QEP na ACMP?", o: ["Um tipo de certificação", "Qualified Education Provider - provedor de treinamento aprovado", "Um software de CM", "Um cargo executivo"], c: 1, e: "QEP (Qualified Education Provider) é uma organização aprovada pela ACMP para oferecer treinamento preparatório para o CCMP." },
        { q: "Segundo o Standard, qual é uma das primeiras atividades em um processo de mudança?", o: ["Implementar a solução", "Avaliar o impacto da mudança e identificar stakeholders", "Celebrar os resultados", "Treinar toda a organização"], c: 1, e: "Avaliar o impacto e identificar stakeholders são atividades iniciais fundamentais para planejar a abordagem de mudança." },
        { q: "O mercado global de consultoria em Gestão de Mudanças está projetado para atingir quanto até 2031?", o: ["US$ 500 milhões", "US$ 1,5 bilhão", "US$ 3,29 bilhões", "US$ 10 bilhões"], c: 2, e: "O mercado deve crescer de US$ 1,96 bi (2025) para US$ 3,29 bi (2031), com CAGR de 9,02%." },
        { q: "Qual % das organizações já utiliza IA em alguma função de negócio?", o: ["25%", "50%", "75%", "88%"], c: 3, e: "88% das organizações já usam IA em pelo menos uma função de negócio, mas apenas um terço conseguiu escalar com sucesso." },
        { q: "Em que ano a ACMP foi fundada?", o: ["2005", "2008", "2011", "2015"], c: 2, e: "A ACMP foi fundada em 2011 como organização global sem fins lucrativos dedicada à profissão de Gestão de Mudanças." },
        { q: "Como o Standard ACMP define 'Change'?", o: ["A entrega de uma nova tecnologia", "A transição de um estado atual para um estado futuro", "Uma reorganização estrutural", "Qualquer melhoria de processo"], c: 1, e: "Definição 3.3.i do Standard: Change = a transição de um estado atual (current state) para um estado futuro (future state)." },
        { q: "Quantos Grupos de Processos tem o Standard ACMP?", o: ["3", "4", "5", "6"], c: 2, e: "São 5 Grupos de Processos: 5.1 Evaluate, 5.2 Formulate, 5.3 Develop, 5.4 Execute e 5.5 Close." },
        { q: "O que é 'Adoption' (Adoção) no Standard ACMP?", o: ["A aprovação formal de um plano", "Escolher aceitar e demonstrar uma nova forma de pensar ou se comportar", "A contratação de novos colaboradores", "A publicação de uma política"], c: 1, e: "Adoção ocorre quando o comportamento do stakeholder é suficientemente consistente com o comportamento do estado futuro — é sobre comportamento, não apenas conhecimento." },
        { q: "O que é 'Change Saturation'?", o: ["O orçamento máximo de um projeto", "A condição em que o volume de mudança é maior do que pode ser gerenciado pelos afetados", "O ponto final de uma transformação", "A documentação completa do plano"], c: 1, e: "Change Saturation reduz a adoção e aumenta a resistência — é o sinal de que a organização está sobrecarregada de mudanças simultâneas." },
        { q: "Quem é considerado um 'stakeholder' segundo o Standard ACMP?", o: ["Apenas o sponsor do projeto", "Qualquer indivíduo afetado por uma mudança", "Apenas executivos seniores", "Apenas clientes externos"], c: 1, e: "Definição 3.15: Stakeholder = um indivíduo afetado por uma mudança. Definição simples e abrangente." },
        { q: "O que é 'Sustainability' no contexto de CM?", o: ["Práticas verdes na organização", "A capacidade de manter o estado futuro", "A duração do plano de projeto", "O orçamento de manutenção"], c: 1, e: "Sustainability (Def. 3.16) = a capacidade de manter o estado futuro, garantindo que a mudança não regrida ao estado anterior." },
        { q: "Qual é a principal diferença entre 'Strategy' e 'Plan' em CM?", o: ["Strategy é mais longa que o Plan", "Strategy = o 'porquê' e 'o quê'; Plan = o 'como'", "Strategy é feita pelo sponsor; Plan pelo CM Lead", "São termos sinônimos"], c: 1, e: "Standard 5.2 vs 5.3: 'The CM Strategy provides the why and the what, and the CM Plan provides the how.'" },
        { q: "Quantos Planos Componentes formam o Comprehensive CM Plan?", o: ["5", "6", "7", "8"], c: 3, e: "São 8 planos: Resource, Communication, Sponsorship, Stakeholder Engagement, Readiness, L&D, M&BR e Sustainability." },
        { q: "Resistance Management, segundo o Standard, significa:", o: ["Eliminar toda resistência à mudança", "Substituir stakeholders resistentes", "Endereçar (não eliminar) a oposição dos stakeholders à mudança", "Aplicar sanções a quem resiste"], c: 2, e: "Definição 3.13.ii: Resistance Management = the process of addressing stakeholders' opposition to a change. Endereçar, não eliminar." },
        { q: "Atividades de Change Management costumam terminar quando o projeto é encerrado?", o: ["Sim, sempre encerram juntas", "Não — frequentemente continuam após o encerramento, especialmente sustentação e reinforcement", "Sim, exceto em mudanças tecnológicas", "Apenas se o sponsor solicitar"], c: 1, e: "Standard 4.4: 'Change management activities frequently continue long after the change is delivered and the project is closed.'" },
        { q: "Sucesso de uma Communication Strategy significa que cada stakeholder consegue articular:", o: ["O cronograma do projeto", "O que está mudando, como beneficia a organização e como o afeta individualmente (WIIFM)", "Apenas as metas executivas", "O orçamento aprovado"], c: 1, e: "WIIFM = What's In It For Me. O Standard (5.2.2) define sucesso como cada stakeholder articulando os 3 elementos." },
        { q: "Quem é 'accountable' pela realização dos benefícios de uma mudança?", o: ["O CM Practitioner", "O Project Manager", "O Sponsor", "O Change Agent"], c: 2, e: "Definição 3.14.i: Sponsor = the individual or group that is accountable for the realization of the benefits of a change." },
        { q: "Os 5 Deveres do Código de Ética da ACMP são:", o: ["Honestidade, Lealdade, Disciplina, Transparência e Inovação", "Honestidade, Responsabilidade, Justiça, Respeito e Avanço da Disciplina", "Confidencialidade, Pontualidade, Lealdade, Justiça e Empatia", "Integridade, Sigilo, Liderança, Profissionalismo e Compaixão"], c: 1, e: "Os 5 Deveres do Código de Ética: 4.1 Honesty, 4.2 Responsibility, 4.3 Fairness, 4.4 Respect, 4.5 Advancing the Discipline & Supporting Practitioners." },
        { q: "Em que ano foi publicada a 1ª edição do Standard ACMP?", o: ["2008", "2011", "2014", "2018"], c: 2, e: "A 1ª edição foi publicada em 2014, fruto de colaboração de mais de 1.100 profissionais de 57 países." },
        { q: "O Standard ACMP é descrito como 'method-neutral'. O que isso significa?", o: ["Não funciona com nenhuma metodologia conhecida", "Não prescreve nem favorece nenhuma metodologia específica — baseia-se em muitas e identifica práticas geralmente aceitas", "É uma metodologia exclusiva da ACMP", "Substitui ADKAR e Kotter"], c: 1, e: "Method-neutral: o Standard não prescreve ADKAR, Kotter, McKinsey 7-S etc. Baseia-se em muitas metodologias e identifica práticas comuns." },
        { q: "O que é o JTA (Job Task Analysis) no contexto da ACMP?", o: ["Um curso preparatório para o CCMP", "Pesquisa global que mapeia como o CM é praticado na realidade — fundamenta o exame de certificação", "Um documento legal interno", "Uma certificação alternativa ao CCMP"], c: 1, e: "O JTA mapeia tarefas realmente executadas por profissionais de CM no mundo, garantindo que o exame CCMP® avalie competências práticas e relevantes." },
        { q: "Quantos Subject Groups o Appendix B do Standard usa para mapear os processos?", o: ["5", "7", "9", "12"], c: 2, e: "9 Subject Groups: Change Initiative Scope, Communication, L&D, Stakeholder Mgmt & Engagement, Resource Mgmt, Leadership/Sponsorship, M&BR, Risk Management e Sustainability." },
        { q: "O Standard ACMP pode ser aplicado em quais contextos?", o: ["Apenas em organizações privadas grandes", "Apenas em mudanças tecnológicas", "Em qualquer tipo de organização (pública/privada/comunitária) e qualquer tipo de mudança", "Apenas em iniciativas com mais de 6 meses"], c: 2, e: "O Standard é escalável a qualquer organização e qualquer mudança, independentemente de complexidade, tamanho, duração, geografia ou cultura." },
        { q: "O que é uma 'Change Network' no Standard ACMP?", o: ["Software de gestão de mudanças", "Conjunto integrado de papéis (CM Lead, Practitioners, Change Leaders, Change Agents) que formam a estrutura de suporte à mudança", "Rede social de profissionais CCMP", "Lista de stakeholders impactados"], c: 1, e: "Change Network = conjunto integrado de papéis que formam a estrutura de suporte à mudança. Ativada na execução para feedback e gestão de resistência." },
        { q: "Qual a diferença entre 'accountable' e 'responsible' no Standard?", o: ["São sinônimos", "Accountable = leva à conclusão e responde pelos resultados; Responsible = faz o trabalho diário", "Accountable é técnico; Responsible é gerencial", "Accountable é externo; Responsible é interno"], c: 1, e: "Distinção crítica do Standard: Sponsor é accountable pelos benefícios (resultado final); CM Practitioner é responsible pela coordenação diária — mas NÃO accountable pela estratégia." },
        { q: "Qual a relação entre o Código de Ética e o Standard for Change Management?", o: ["São documentos independentes", "O Código apoia e complementa o Standard — Standard define O QUE fazer, Código define COMO se comportar profissionalmente", "O Código substitui o Standard em conflitos", "O Standard é subordinado ao Código"], c: 1, e: "Os tenets do Código apoiam e complementam os comportamentos do Standard. Standard = O QUE fazer; Código = COMO se comportar." },
        { q: "Quais documentos são referências NORMATIVAS do Standard ACMP?", o: ["PMBOK e ITIL", "ACMP Statement of Change Management (Appendix A) e ISO 21500:2012(E)", "ISO 9001 e ISO 14001", "ACMP Code of Ethics e PMBOK"], c: 1, e: "As 2 referências normativas (indispensáveis): ACMP Statement of CM (Appendix A) e ISO 21500:2012(E) — Guidance on project management." }
    ];

    var currentQ = 0, score = 0, answered = false;

    function startQuiz() {
        var openGate = function () {
            if (window.GameGate) {
                GameGate.start({
                    gameId: 'quiz-cm',
                    gameTitle: 'Quiz: Gestão de Mudanças',
                    onReady: function (player) {
                        // Após identificação, revalida categoria (pode ter mudado community→member).
                        if (window.GameAccess) {
                            GameAccess.guardPage({ gameId: 'quiz-cm' }).then(function (ok) {
                                if (ok) _startQuizCore();
                            });
                        } else {
                            _startQuizCore();
                        }
                    }
                });
            } else {
                _startQuizCore();
            }
        };
        if (window.GameAccess) {
            GameAccess.guardPage({ gameId: 'quiz-cm' }).then(function (ok) {
                if (ok) openGate();
            });
        } else {
            openGate();
        }
    }
    function _startQuizCore() {
        currentQ = 0; score = 0;
        shuffle(questions);
        document.getElementById('quiz-start').style.display = 'none';
        document.getElementById('quiz-game').style.display = 'block';
        document.getElementById('quiz-result').style.display = 'none';
        showQuestion();
    }

    function shuffle(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
        }
    }

    function showQuestion() {
        answered = false;
        var q = questions[currentQ];
        document.getElementById('question-text').textContent = q.q;
        document.getElementById('progress-text').textContent = (currentQ + 1) + '/' + questions.length;
        document.getElementById('progress-fill').style.width = ((currentQ + 1) / questions.length * 100) + '%';
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        var letters = ['A', 'B', 'C', 'D'];
        var html = '';
        for (var i = 0; i < q.o.length; i++) {
            html += '<div class="quiz-option" onclick="selectOption(this, ' + i + ')">' +
                '<span class="opt-letter">' + letters[i] + '</span>' +
                '<span>' + q.o[i] + '</span></div>';
        }
        document.getElementById('options-container').innerHTML = html;
    }

    function selectOption(el, idx) {
        if (answered) return;
        answered = true;
        var q = questions[currentQ];
        var opts = document.querySelectorAll('.quiz-option');
        opts.forEach(function(o, i) {
            if (i === q.c) o.classList.add('correct');
            if (i === idx && i !== q.c) o.classList.add('wrong');
        });
        el.classList.add('selected');
        if (idx === q.c) score++;
        document.getElementById('explanation').textContent = q.e;
        document.getElementById('explanation').style.display = 'block';
        var nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = 'inline-flex';
        nextBtn.textContent = currentQ === questions.length - 1 ? 'Ver Resultado' : 'Próxima ';
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ >= questions.length) {
            showResult();
        } else {
            showQuestion();
        }
    }

    var quizFinishOpts = null;
    function showResult() {
        document.getElementById('quiz-game').style.display = 'none';
        var pct = Math.round(score / questions.length * 100);
        var color = pct >= 80 ? '#16a34a' : pct >= 60 ? '#d97706' : '#dc2626';
        var msg = pct >= 80 ? 'Excelente! Você domina Gestão de Mudanças!' : pct >= 60 ? 'Bom trabalho! Mas ainda há espaço para melhorar.' : 'Continue estudando! Recomendamos revisar o ACMP Standard.';
        document.getElementById('quiz-result').style.display = 'block';
        document.getElementById('quiz-result').innerHTML =
            '<div class="quiz-score">' +
            '<div class="score-circle" style="background:' + color + '22;color:' + color + ';">' +
            '<div class="score-value">' + pct + '%</div><div class="score-label">' + score + '/' + questions.length + ' corretas</div></div>' +
            '<div class="score-msg">' + msg + '</div>' +
            '<div class="score-detail">Você acertou ' + score + ' de ' + questions.length + ' perguntas sobre Gestão de Mudanças.</div>' +
            '<div id="quiz-leaderboard" style="margin:24px 0;"></div>' +
            '<div class="score-actions">' +
            '<button class="btn-replay" onclick="startQuiz()"><i class="fas fa-redo"></i> Jogar Novamente</button>' +
            '<a href="/jogos/" class="btn-back"><i class="fas fa-arrow-left"></i> Todos os Jogos</a>' +
            '</div>' +
            '<div style="text-align:center;margin-top:14px;">' +
              '<button id="quiz-finish-btn" type="button" onclick="quizTriggerFinish()" style="background:transparent;border:0;color:var(--primary);font-family:inherit;font-size:0.82rem;font-weight:600;cursor:pointer;text-decoration:underline;opacity:.85;">⭐ Avaliar partida e desafiar amigo</button>' +
            '</div>' +
            '</div>';

        // Salva pontuação imediatamente e renderiza ranking — sem abrir modal.
        quizFinishOpts = {
            gameId: 'quiz-cm',
            gameTitle: 'Quiz: Gestão de Mudanças',
            score: pct,
            scoreData: { score: score, total: questions.length, percentage: pct }
        };
        if (window.GameGate && typeof GameGate.saveScore === 'function') {
            GameGate.saveScore(quizFinishOpts);
            quizFinishOpts.scoreSaved = true;
        }
        if (window.Leaderboard) {
            Leaderboard.render({
                container: '#quiz-leaderboard',
                gameId: 'quiz-cm',
                limit: 10,
                title: 'Top jogadores',
                formatScore: function (r) { return r.score + '%'; }
            });
        }
    }

    function quizTriggerFinish() {
        if (!window.GameGate || !quizFinishOpts) return;
        var btn = document.getElementById('quiz-finish-btn');
        if (btn) { btn.disabled = true; btn.textContent = 'Carregando…'; }
        GameGate.finish(quizFinishOpts);
    }
    </script>
</body>
</html>
