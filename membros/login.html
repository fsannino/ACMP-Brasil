<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Associado - Login - ACMP Brasil</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" type="image/png" href="../img/logo-acmp-brasil.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: var(--bg-light); min-height: 100vh; display: flex; flex-direction: column; }
        .login-header { background: var(--primary-dark); padding: 16px 0; text-align: center; }
        .login-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .login-card { background: var(--bg-white); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 40px; max-width: 440px; width: 100%; }
        .login-card .logo-area { text-align: center; margin-bottom: 24px; }
        .login-card .logo-area img { height: 50px; }
        .login-card h1 { font-size: 1.4rem; font-weight: 700; color: var(--text-dark); text-align: center; margin-bottom: 6px; }
        .login-card .subtitle { text-align: center; color: var(--text-light); font-size: 0.88rem; margin-bottom: 28px; }
        .tab-switch { display: flex; margin-bottom: 24px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; text-align: center; font-weight: 600; font-size: 0.88rem; cursor: pointer; background: var(--bg-light); color: var(--text-light); border: none; font-family: var(--font-main); transition: all 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-dark); margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font-main); font-size: 0.9rem; }
        .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,58,92,0.1); }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); font-family: var(--font-main); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background: var(--primary-light); }
        .divider { display: flex; align-items: center; gap: 14px; margin: 20px 0; color: var(--text-light); font-size: 0.82rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .btn-google { width: 100%; padding: 12px; background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font-main); font-size: 0.88rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--text-body); transition: all 0.2s; }
        .btn-google:hover { background: var(--bg-light); box-shadow: var(--shadow-sm); }
        .login-footer { text-align: center; margin-top: 20px; font-size: 0.82rem; color: var(--text-light); }
        .login-footer a { color: var(--primary); font-weight: 600; }
        .alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 0.85rem; margin-bottom: 16px; display: none; }
        .alert-error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
        .forgot-link { display: block; text-align: right; font-size: 0.82rem; color: var(--primary); margin-top: 8px; }
        .member-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(26,58,92,0.08); color: var(--primary); padding: 6px 14px; border-radius: 50px; font-size: 0.78rem; font-weight: 600; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="login-header">
        <a href="../index.html"><img src="../img/logo-acmp-brasil-white.png" alt="ACMP Brasil" style="height: 36px;"></a>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <div class="member-badge"><i class="fas fa-lock"></i> Área Exclusiva do Associado</div>
            </div>
            <h1>Bem-vindo</h1>
            <p class="subtitle">Acesse conteúdos exclusivos, ferramentas e jogos para membros ACMP.</p>

            <div class="alert alert-error" id="alert-error"></div>
            <div class="alert alert-success" id="alert-success"></div>

            <div class="tab-switch">
                <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Entrar</button>
                <button class="tab-btn" id="tab-register" onclick="showTab('register')">Criar Conta</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="login-email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="login-password" required placeholder="Sua senha" minlength="6">
                    <a href="#" class="forgot-link" onclick="handleForgot(event)">Esqueci minha senha</a>
                </div>
                <button type="submit" class="btn-submit" id="btn-login"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" style="display:none;" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Nome completo</label>
                    <input type="text" id="reg-name" required placeholder="Seu nome">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="reg-email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label>Senha <small>(mínimo 6 caracteres)</small></label>
                    <input type="password" id="reg-password" required placeholder="Crie uma senha" minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirmar senha</label>
                    <input type="password" id="reg-password2" required placeholder="Repita a senha" minlength="6">
                </div>
                <button type="submit" class="btn-submit" id="btn-register"><i class="fas fa-user-plus"></i> Criar Conta</button>
            </form>

            <div class="divider">ou</div>

            <button class="btn-google" onclick="handleGoogle()">
                <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z"/></svg>
                Continuar com Google
            </button>

            <div class="login-footer">
                <p>Ainda não é membro da ACMP? <a href="https://www.acmpglobal.org/page/join_acmp" target="_blank">Associe-se</a></p>
                <p style="margin-top: 8px;"><a href="../index.html"><i class="fas fa-arrow-left"></i> Voltar ao site</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase-client.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded. Protocol:', window.location.protocol);
            if (window.location.protocol === 'file:') {
                showError('Este site precisa estar hospedado em um servidor web (ex: Vercel). Não funciona aberto como arquivo local.');
                return;
            }

            waitForSupabase(async function(ok) {
                if (!ok) {
                    showError('Erro ao carregar o sistema de autenticação. Recarregue a página.');
                    return;
                }
                console.log('Supabase ready!');
                try {
                    var session = await getSession();
                    if (session) { window.location.href = 'index.html'; }
                } catch (err) {
                    console.error('Session check error:', err);
                }
            });
        });

        function showTab(tab) {
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            hideAlerts();
        }

        function showError(msg) { var el = document.getElementById('alert-error'); el.textContent = msg; el.style.display = 'block'; document.getElementById('alert-success').style.display = 'none'; }
        function showSuccess(msg) { var el = document.getElementById('alert-success'); el.textContent = msg; el.style.display = 'block'; document.getElementById('alert-error').style.display = 'none'; }
        function hideAlerts() { document.getElementById('alert-error').style.display = 'none'; document.getElementById('alert-success').style.display = 'none'; }

        async function handleLogin(e) {
            e.preventDefault();
            var btn = document.getElementById('btn-login');
            btn.disabled = true; btn.textContent = 'Entrando...';
            try {
                var { data, error } = await signIn(
                    document.getElementById('login-email').value,
                    document.getElementById('login-password').value
                );
                console.log('Login result:', { data, error });
                if (error) {
                    var msg = error.message;
                    if (msg === 'Invalid login credentials') msg = 'E-mail ou senha incorretos.';
                    if (msg.includes('fetch')) msg = 'Erro de conexão. Verifique se o site está online (não funciona como arquivo local).';
                    showError(msg);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                } else {
                    showSuccess('Login realizado! Redirecionando...');
                    setTimeout(function() { window.location.href = 'index.html'; }, 500);
                }
            } catch (err) {
                console.error('Login exception:', err);
                showError('Erro: ' + err.message + '. O site precisa estar em um servidor web (Vercel), não como arquivo local.');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            var pw1 = document.getElementById('reg-password').value;
            var pw2 = document.getElementById('reg-password2').value;
            if (pw1 !== pw2) { showError('As senhas não coincidem.'); return; }
            var btn = document.getElementById('btn-register');
            btn.disabled = true; btn.textContent = 'Criando conta...';
            var { data, error } = await signUp(
                document.getElementById('reg-email').value, pw1,
                document.getElementById('reg-name').value
            );
            if (error) { showError(error.message); btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus"></i> Criar Conta'; }
            else { showSuccess('Conta criada! Verifique seu e-mail para confirmar.'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus"></i> Criar Conta'; }
        }

        async function handleGoogle() { await signInWithGoogle(); }

        async function handleForgot(e) {
            e.preventDefault();
            var email = document.getElementById('login-email').value;
            if (!email) { showError('Digite seu e-mail primeiro.'); return; }
            var { error } = await resetPassword(email);
            if (error) { showError(error.message); }
            else { showSuccess('E-mail de recuperação enviado para ' + email); }
        }
    </script>
</body>
</html>
