<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Associado - Login - ACMP Brasil</title>
    <link rel="icon" type="image/png" href="../img/logo-acmp-brasil.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #1a3a5c; --primary-light: #2a5a8c; --primary-dark: #0f2440; --secondary: #e8a838; --text-dark: #1a1a2e; --text-body: #4a4a5a; --text-light: #6b7280; --bg-white: #fff; --bg-light: #f8f9fc; --border: #e2e8f0; --radius-sm: 6px; --radius-lg: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); min-height: 100vh; display: flex; flex-direction: column; }
        .login-header { background: var(--primary-dark); padding: 16px 0; text-align: center; }
        .login-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .login-card { background: var(--bg-white); border-radius: var(--radius-lg); box-shadow: 0 8px 30px rgba(0,0,0,0.12); padding: 40px; max-width: 440px; width: 100%; }
        .login-card h1 { font-size: 1.4rem; font-weight: 700; color: var(--text-dark); text-align: center; margin-bottom: 6px; }
        .login-card .subtitle { text-align: center; color: var(--text-light); font-size: 0.88rem; margin-bottom: 28px; }
        .member-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(26,58,92,0.08); color: var(--primary); padding: 6px 14px; border-radius: 50px; font-size: 0.78rem; font-weight: 600; margin-bottom: 16px; text-align: center; width: 100%; justify-content: center; }
        .tab-switch { display: flex; margin-bottom: 24px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; text-align: center; font-weight: 600; font-size: 0.88rem; cursor: pointer; background: var(--bg-light); color: var(--text-light); border: none; font-family: 'Inter', sans-serif; }
        .tab-btn.active { background: var(--primary); color: white; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-dark); margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 0.9rem; }
        .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,58,92,0.1); }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
        .btn-submit:hover { background: var(--primary-light); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 0.85rem; margin-bottom: 16px; display: none; }
        .alert-error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
        .forgot-link { display: block; text-align: right; font-size: 0.82rem; color: var(--primary); margin-top: 8px; text-decoration: none; }
        .login-footer { text-align: center; margin-top: 20px; font-size: 0.82rem; color: var(--text-light); }
        .login-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
        #loading-msg { text-align: center; padding: 20px; color: var(--text-light); font-size: 0.88rem; }
    </style>
</head>
<body>
    <div class="login-header">
        <a href="../index.html"><img src="../img/logo-acmp-brasil-white.png" alt="ACMP Brasil" style="height: 36px;"></a>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="member-badge"><i class="fas fa-lock"></i> Área Exclusiva do Associado</div>
            <h1>Bem-vindo</h1>
            <p class="subtitle">Acesse conteúdos exclusivos, ferramentas e jogos para membros ACMP.</p>

            <div id="loading-msg"><i class="fas fa-spinner fa-spin"></i> Conectando...</div>

            <div id="login-content" style="display: none;">
                <div class="alert alert-error" id="alert-error"></div>
                <div class="alert alert-success" id="alert-success"></div>

                <div class="tab-switch">
                    <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Entrar</button>
                    <button class="tab-btn" id="tab-register" onclick="showTab('register')">Criar Conta</button>
                </div>

                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="login-email" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="login-password" required placeholder="Sua senha" minlength="6">
                        <a href="#" class="forgot-link" onclick="handleForgot(event)">Esqueci minha senha</a>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-login"><i class="fas fa-sign-in-alt"></i> Entrar</button>
                </form>

                <form id="register-form" style="display:none;" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Nome completo</label>
                        <input type="text" id="reg-name" required placeholder="Seu nome">
                    </div>
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="reg-email" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label>Senha (mínimo 6 caracteres)</label>
                        <input type="password" id="reg-password" required placeholder="Crie uma senha" minlength="6">
                    </div>
                    <div class="form-group">
                        <label>Confirmar senha</label>
                        <input type="password" id="reg-password2" required placeholder="Repita a senha" minlength="6">
                    </div>
                    <div class="form-group">
                        <label>Tipo de cadastro</label>
                        <select id="reg-type" style="width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:0.9rem;background:white;">
                            <option value="community">Comunidade / Voluntário / Interessado em CM</option>
                            <option value="member">Sou associado ACMP Global</option>
                        </select>
                        <p style="font-size:0.75rem;color:var(--text-light);margin-top:6px;" id="reg-type-hint">
                            Acesso gratuito a conteúdos selecionados da comunidade.
                        </p>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-register"><i class="fas fa-user-plus"></i> Criar Conta</button>
                    <script>
                        document.getElementById('reg-type').addEventListener('change', function() {
                            var hint = document.getElementById('reg-type-hint');
                            if (this.value === 'member') {
                                hint.textContent = 'Sua associação será verificada. Acesso completo após aprovação.';
                            } else {
                                hint.textContent = 'Acesso gratuito a conteúdos selecionados da comunidade.';
                            }
                        });
                    </script>
                </form>
            </div>

            <div class="login-footer">
                <p>Ainda não é membro? <a href="https://www.acmpglobal.org/page/join_acmp" target="_blank">Associe-se</a></p>
                <p style="margin-top: 8px;"><a href="../index.html"><i class="fas fa-arrow-left"></i> Voltar ao site</a></p>
            </div>
        </div>
    </div>

    <script src="../js/supabase.min.js"></script>
    <script>
        // ===== INLINE SUPABASE CONFIG =====
        var SUPA_URL = 'https://yaumzlssybzoipwmllqy.supabase.co';
        var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhdW16bHNzeWJ6b2lwd21sbHF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTcwMTEsImV4cCI6MjA5MTQ5MzAxMX0.GWK1jnlEmgxWmeWk1VGwR25fLBvquWtrkQ4ipq_A3RU';
        var sb = null;

        // Debug: show what's available
        var dbg = 'supabase type: ' + typeof window.supabase;
        if (window.supabase) {
            dbg += ', createClient: ' + typeof window.supabase.createClient;
        }

        try {
            if (typeof window.supabase === 'undefined') {
                throw new Error('SDK not loaded. supabase.min.js may have failed.');
            }
            if (typeof window.supabase.createClient !== 'function') {
                // Try as default export
                if (typeof window.supabase.default !== 'undefined' && typeof window.supabase.default.createClient === 'function') {
                    sb = window.supabase.default.createClient(SUPA_URL, SUPA_KEY);
                } else {
                    throw new Error('createClient not found. SDK format: ' + Object.keys(window.supabase).join(','));
                }
            } else {
                sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
            }
            document.getElementById('loading-msg').style.display = 'none';
            document.getElementById('login-content').style.display = 'block';
            checkSession();
        } catch(e) {
            document.getElementById('loading-msg').innerHTML =
                '<span style="color:#dc2626;">Erro: ' + e.message + '</span><br>' +
                '<span style="font-size:0.75rem;color:#999;">Debug: ' + dbg + '</span><br>' +
                '<a href="javascript:location.reload()" style="color:#1a3a5c;font-weight:600;">Recarregar</a>';
            document.getElementById('login-content').style.display = 'block';
        }

        async function checkSession() {
            try {
                var result = await sb.auth.getSession();
                if (result.data.session) { window.location.href = 'index.html'; }
            } catch(e) { console.log('No session'); }
        }

        function showTab(tab) {
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            hideAlerts();
        }

        function showError(msg) { var el = document.getElementById('alert-error'); el.textContent = msg; el.style.display = 'block'; document.getElementById('alert-success').style.display = 'none'; }
        function showSuccess(msg) { var el = document.getElementById('alert-success'); el.textContent = msg; el.style.display = 'block'; document.getElementById('alert-error').style.display = 'none'; }
        function hideAlerts() { document.getElementById('alert-error').style.display = 'none'; document.getElementById('alert-success').style.display = 'none'; }

        async function handleLogin(e) {
            e.preventDefault();
            if (!sb) { showError('Sistema não carregado. Recarregue a página.'); return; }
            var btn = document.getElementById('btn-login');
            btn.disabled = true; btn.textContent = 'Entrando...';
            try {
                var result = await sb.auth.signInWithPassword({
                    email: document.getElementById('login-email').value,
                    password: document.getElementById('login-password').value
                });
                console.log('Login result:', result);
                if (result.error) {
                    showError(result.error.message === 'Invalid login credentials' ? 'E-mail ou senha incorretos.' : result.error.message);
                } else {
                    // Check membership status before allowing access
                    console.log('User logged in:', result.data.user.id, result.data.user.email);
                    var profile = await sb.from('member_profiles').select('membership_status, role').eq('id', result.data.user.id).single();
                    console.log('Profile query result:', profile);

                    // If profile query fails (RLS issue), try by email
                    if (!profile.data) {
                        console.log('Profile not found by ID, trying email...');
                        profile = await sb.from('member_profiles').select('membership_status, role').eq('email', result.data.user.email).single();
                        console.log('Profile by email:', profile);
                    }

                    var status = profile.data ? profile.data.membership_status : 'pending';
                    var role = profile.data ? profile.data.role : 'member';
                    console.log('Status:', status, 'Role:', role);

                    if (status === 'active' || status === 'community' || role === 'admin') {
                        showSuccess('Login realizado! Redirecionando...');
                        setTimeout(function() { window.location.href = 'index.html'; }, 500);
                        return;
                    } else if (status === 'rejected') {
                        await sb.auth.signOut();
                        showError('Sua solicitação de acesso não foi aprovada. Entre em contato com contato@acmpbrasil.org.br para mais informações.');
                    } else {
                        // pending
                        await sb.auth.signOut();
                        document.getElementById('login-content').innerHTML =
                            '<div style="text-align:center;padding:20px 0;">' +
                            '<div style="font-size:3rem;color:#d97706;margin-bottom:16px;"><i class="fas fa-hourglass-half"></i></div>' +
                            '<h2 style="font-size:1.3rem;font-weight:700;color:#1a1a2e;margin-bottom:12px;">Acesso pendente</h2>' +
                            '<p style="color:#4a4a5a;font-size:0.92rem;line-height:1.7;">' +
                            'Sua inscrição está sendo analisada pela equipe ACMP Brasil.<br>' +
                            'Você receberá um e-mail assim que seu acesso for liberado.</p>' +
                            '<a href="../index.html" style="color:#1a3a5c;font-weight:600;font-size:0.88rem;margin-top:20px;display:inline-block;"><i class="fas fa-arrow-left"></i> Voltar ao site</a>' +
                            '</div>';
                        return;
                    }
                }
            } catch(err) {
                console.error('Login error:', err);
                showError('Erro: ' + err.message);
            }
            btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
        }

        async function handleRegister(e) {
            e.preventDefault();
            if (!sb) { showError('Sistema não carregado.'); return; }
            var pw1 = document.getElementById('reg-password').value;
            var pw2 = document.getElementById('reg-password2').value;
            if (pw1 !== pw2) { showError('As senhas não coincidem.'); return; }
            var regType = document.getElementById('reg-type').value;
            var btn = document.getElementById('btn-register');
            btn.disabled = true; btn.textContent = 'Criando conta...';
            try {
                var result = await sb.auth.signUp({
                    email: document.getElementById('reg-email').value,
                    password: pw1,
                    options: { data: { full_name: document.getElementById('reg-name').value, reg_type: regType } }
                });
                if (result.error) {
                    showError(result.error.message);
                } else {
                    // Both types get community access immediately
                    if (result.data.user) {
                        await sb.from('member_profiles').update({ membership_status: 'community' }).eq('id', result.data.user.id);
                    }

                    if (regType === 'community') {
                        document.getElementById('login-content').innerHTML =
                            '<div style="text-align:center;padding:20px 0;">' +
                            '<div style="font-size:3rem;color:#16a34a;margin-bottom:16px;"><i class="fas fa-check-circle"></i></div>' +
                            '<h2 style="font-size:1.3rem;font-weight:700;color:#1a1a2e;margin-bottom:12px;">Bem-vindo à comunidade!</h2>' +
                            '<p style="color:#4a4a5a;font-size:0.92rem;line-height:1.7;margin-bottom:20px;">' +
                            'Sua conta foi criada com sucesso.<br>' +
                            'Você já pode fazer login e acessar conteúdos da comunidade.</p>' +
                            '<div style="background:#dcfce7;border:1px solid #bbf7d0;border-radius:8px;padding:16px;margin:16px 0;text-align:left;font-size:0.85rem;color:#16a34a;">' +
                            '<strong><i class="fas fa-lightbulb"></i> Dica:</strong> Para acesso completo ao conteúdo exclusivo, ' +
                            '<a href="https://www.acmpglobal.org/page/join_acmp" target="_blank" style="color:#16a34a;font-weight:600;">associe-se à ACMP Global</a>.</div>' +
                            '<button onclick="location.reload()" style="background:#1a3a5c;color:white;border:none;padding:12px 28px;border-radius:6px;font-size:0.92rem;font-weight:600;cursor:pointer;margin-top:10px;"><i class="fas fa-sign-in-alt"></i> Fazer Login</button>' +
                            '</div>';
                    } else {
                        // Member request - show pending message
                        document.getElementById('login-content').innerHTML =
                            '<div style="text-align:center;padding:20px 0;">' +
                            '<div style="font-size:3rem;color:#16a34a;margin-bottom:16px;"><i class="fas fa-check-circle"></i></div>' +
                            '<h2 style="font-size:1.3rem;font-weight:700;color:#1a1a2e;margin-bottom:12px;">Conta criada com sucesso!</h2>' +
                            '<p style="color:#4a4a5a;font-size:0.92rem;line-height:1.7;margin-bottom:20px;">' +
                            'Você já pode fazer login e acessar o <strong>conteúdo da comunidade</strong>.</p>' +
                            '<div style="background:#dbeafe;border:1px solid #93c5fd;border-radius:8px;padding:16px;margin:16px 0;text-align:left;font-size:0.85rem;color:#1e40af;">' +
                            '<strong><i class="fas fa-info-circle"></i> Validação em andamento:</strong><br>' +
                            'Sua associação à ACMP Global será verificada pela nossa equipe. ' +
                            'Quando aprovado, você terá acesso ao <strong>conteúdo exclusivo completo</strong> (materiais, templates, webinars e jogos de membros).</div>' +
                            '<button onclick="location.reload()" style="background:#1a3a5c;color:white;border:none;padding:12px 28px;border-radius:6px;font-size:0.92rem;font-weight:600;cursor:pointer;margin-top:10px;"><i class="fas fa-sign-in-alt"></i> Fazer Login</button>' +
                            '</div>';
                }
            } catch(err) {
                showError('Erro: ' + err.message);
            }
            btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus"></i> Criar Conta';
        }

        async function handleForgot(e) {
            e.preventDefault();
            if (!sb) return;
            var email = document.getElementById('login-email').value;
            if (!email) { showError('Digite seu e-mail primeiro.'); return; }
            try {
                await sb.auth.resetPasswordForEmail(email);
                showSuccess('E-mail de recuperação enviado para ' + email);
            } catch(err) { showError(err.message); }
        }
    </script>
</body>
</html>
